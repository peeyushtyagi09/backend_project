version: "3.8"

services:
  backend:
    build: .
    container_name: reconcile_backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - /app/node_modules

  redis:
    image: redis:7
    container_name: reconcile_redis
    ports:
      - "6379:6379"